<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product_name }} for {{ company_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
        .slide {
            width: 1280px;
            height: 720px;
            padding: 60px 80px;
            page-break-after: always;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 4px solid #3b82f6;
        }
        .slide:last-child { page-break-after: auto; }
        .slide-number {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 14px;
            color: #64748b;
        }
        .slide h2 {
            font-size: 36px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 30px;
            border-left: 4px solid #3b82f6;
            padding-left: 20px;
        }
        .slide .body {
            font-size: 20px;
            line-height: 1.6;
            color: #cbd5e1;
        }
        .slide .body h3 {
            font-size: 24px;
            color: #93c5fd;
            margin: 20px 0 10px 0;
        }
        .slide .body p { margin-bottom: 16px; }
        .slide .body ul {
            margin: 10px 0 20px 30px;
            list-style: none;
        }
        .slide .body ul li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        .slide .body ul li::before {
            content: '\25B6';
            position: absolute;
            left: 0;
            color: #3b82f6;
            font-size: 12px;
            top: 4px;
        }
        .slide .body strong { color: #60a5fa; }
        /* Title slide special styling */
        .slide:first-child {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .slide:first-child h2 {
            font-size: 48px;
            border-left: none;
            padding-left: 0;
            margin-bottom: 20px;
        }
        .slide:first-child .body {
            font-size: 24px;
            color: #94a3b8;
        }
        .logo-bar {
            position: absolute;
            bottom: 30px;
            left: 40px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
{% for slide in slides %}
<div class="slide">
    <h2>{{ slide.title }}</h2>
    <div class="body">{{ slide.body_html | safe }}</div>
    <div class="slide-number">{{ slide.slide_number }} / {{ slides | length }}</div>
    <div class="logo-bar">Generated by SalesForge AI</div>
</div>
{% endfor %}
</body>
</html>
